<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tencent Passpay Landing Page</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for the Telegram Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Georgia', serif;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .countdown-label {
            color: #ff0000;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .profile-border {
            border: 4px solid #ffffff;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Top Join Button -->
    <a href="https://t.me/+Al8NxWjmoj40MmVl"
        class="w-full max-w-md bg-[#0066b2] hover:bg-[#005596] text-white py-3 px-6 rounded-md flex items-center justify-center gap-3 text-xl font-semibold mb-10 transition duration-300">
        <i class="fab fa-telegram text-2xl"></i>
        Join Telegram Now
    </a>

    <!-- Profile Image -->
    <div class="relative w-48 h-48 mb-6">
        <img src="image.jpeg" alt="Tencent Office" class="rounded-full w-full h-full object-cover profile-border">
    </div>

    <!-- Title Section -->
    <div class="bg-white text-black px-8 py-1 mb-6">
        <h1 class="text-2xl font-bold italic">Tencent passpay 🏛️</h1>
    </div>

    <!-- Subtitle Section -->
    <div class="text-center max-w-sm mb-8">
        <p class="text-2xl font-bold leading-tight">
            China no 1 gaming company All Types of funds available
        </p>
    </div>

    <!-- Middle Join Button -->
    <a href="https://t.me/+Al8NxWjmoj40MmVl"
        class="w-full max-w-md bg-[#0066b2] hover:bg-[#005596] text-white py-3 px-6 rounded-md flex items-center justify-center gap-3 text-xl font-semibold mb-12 transition duration-300">
        <i class="fab fa-telegram text-2xl"></i>
        Join Telegram Now
    </a>

    <!-- Countdown Timer -->
    <div id="countdown" class="flex gap-4 text-3xl font-bold mb-16">
        <div class="countdown-item">
            <span id="days">00</span>
            <span class="countdown-label">Days</span>
        </div>
        <span>:</span>
        <div class="countdown-item">
            <span id="hours">23</span>
            <span class="countdown-label">Hours</span>
        </div>
        <span>:</span>
        <div class="countdown-item">
            <span id="minutes">59</span>
            <span class="countdown-label">Minutes</span>
        </div>
        <span>:</span>
        <div class="countdown-item">
            <span id="seconds">42</span>
            <span class="countdown-label">Seconds</span>
        </div>
    </div>



    <script>
        // Simple Countdown Logic
        function updateCountdown() {
            // Setting a target date 24 hours from now for demonstration
            const target = new Date().getTime() + (24 * 60 * 60 * 1000);

            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;

                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = d.toString().padStart(2, '0');
                document.getElementById('hours').innerText = h.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
            }, 1000);
        }

        updateCountdown();
    </script>
</body>

</html>
